name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-venv wget

      - name: Install OCLint
        run: |
          chmod +x install_oclint.sh
          ./install_oclint.sh

      - name: Install Python dependencies
        run: |
          pip install pytest
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -vv --capture=no